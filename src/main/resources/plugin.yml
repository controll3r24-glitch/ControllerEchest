name: ControllerEchest
version: 1.0.0
main: com.controll3r24.controllerechest.ControllerEchest
api-version: 1.21
author: Controll3r24
description: Manage multiple enderchests per player
commands:
  ec:
    description: Open enderchest menu or specific chest
    usage: /ec [number]
  controlechest:
    description: Admin commands for enderchests
    usage: /controlechest open <player> <number>
permissions:
  controlenderchest.open:
    description: Allows using /ec command
    default: true
  controlenderchest.admin:
    description: Allows admin commands and bypass slot restrictions
    default: op
  controlenderchest.staff:
    description: Grants larger enderchest size (54 slots)
    default: op
  controlenderchest.slot.*:
    description: Allows opening any specific slot (wildcard)
    default: false
